name: VoiceInk
options:
  bundleIdPrefix: com.voiceink
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 2UANJX7ATM
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_VERSION: "5.9"

packages:
  Qwen3Speech:
    url: https://github.com/soniqo/speech-swift
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.0"

targets:
  VoiceInk:
    type: application
    platform: macOS
    sources:
      - path: VoiceInk
        excludes:
          - Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voiceink.app
        INFOPLIST_FILE: VoiceInk/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceInk/Resources/VoiceInk.entitlements
        PRODUCT_NAME: VoiceInk
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: Qwen3Speech
        product: Qwen3ASR
      - package: Sparkle
        product: Sparkle
