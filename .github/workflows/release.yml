name: Build, Notarize & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: VoiceInk
  SCHEME: VoiceInk
  XCODEPROJ: VoiceInk.xcodeproj

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      # ─── Checkout ───
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Extract version from tag ───
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      # ─── Install signing certificate ───
      - name: Install certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Clean up certificate file
          rm -f "$CERT_PATH"

      # ─── Resolve packages ───
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm"

      # ─── Build & Archive ───
      - name: Archive
        run: |
          xcodebuild archive \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            ENABLE_HARDENED_RUNTIME=YES

      # ─── Export app from archive ───
      - name: Export app
        run: |
          APP_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"
          cp -R "$APP_PATH" "$RUNNER_TEMP/$APP_NAME.app"

          # Re-sign all embedded components with Developer ID (inside-out)
          APP="$RUNNER_TEMP/$APP_NAME.app"
          IDENTITY="Developer ID Application"

          # 1. Sign all Mach-O executables (e.g., Sparkle's Autoupdate, Updater.app)
          find "$APP" -type f -perm +111 | while read f; do
            file "$f" | grep -q "Mach-O" && \
              codesign --force --options runtime --timestamp --sign "$IDENTITY" "$f" 2>/dev/null || true
          done

          # 2. Sign bundles: .xpc, .app, .framework (deepest first)
          find "$APP" \( -name "*.xpc" -o -name "*.app" -o -name "*.framework" \) -not -path "$APP" | sort -r | while read component; do
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$component" 2>/dev/null || true
          done

          # 3. Re-sign the main app last
          codesign --force --options runtime --timestamp --sign "$IDENTITY" "$APP"

          # Verify code signature
          codesign --verify --deep --strict "$APP"
          echo "✅ Code signature verified (including Sparkle components)"

      # ─── Notarize ───
      - name: Notarize app
        id: notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create zip for notarization
          ditto -c -k --keepParent "$RUNNER_TEMP/$APP_NAME.app" "$RUNNER_TEMP/$APP_NAME.zip"

          # Submit for notarization and wait, capture submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/$APP_NAME.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m 2>&1) || true

          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          # Check if notarization succeeded
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
            xcrun stapler staple "$RUNNER_TEMP/$APP_NAME.app"
            echo "✅ Notarization complete and stapled"
          else
            echo "❌ Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              developer_log.json 2>/dev/null || true
            cat developer_log.json 2>/dev/null || true
            exit 1
          fi

      # ─── Create DMG ───
      - name: Create DMG
        run: |
          brew install create-dmg

          DMG_ARGS=(
            --volname "$APP_NAME"
            --window-pos 200 120
            --window-size 660 400
            --icon-size 100
            --icon "$APP_NAME.app" 180 170
            --hide-extension "$APP_NAME.app"
            --app-drop-link 480 170
            --no-internet-enable
          )

          # volicon은 아이콘 파일이 존재할 때만 추가
          ICON_PATH="$RUNNER_TEMP/$APP_NAME.app/Contents/Resources/AppIcon.icns"
          if [ -f "$ICON_PATH" ]; then
            DMG_ARGS+=(--volicon "$ICON_PATH")
          fi

          # create-dmg exits non-zero even on success; check DMG existence instead
          create-dmg \
            "${DMG_ARGS[@]}" \
            "$RUNNER_TEMP/$APP_NAME.dmg" \
            "$RUNNER_TEMP/$APP_NAME.app" \
          || true

          # Verify DMG was actually created
          DMG_PATH="$RUNNER_TEMP/$APP_NAME.dmg"
          if [ ! -f "$DMG_PATH" ]; then
            echo "❌ DMG was not created"
            exit 1
          fi
          ls -lh "$DMG_PATH"

      # ─── Notarize DMG ───
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="$RUNNER_TEMP/$APP_NAME.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple "$DMG_PATH"
          echo "✅ DMG notarized and stapled"

      # ─── Sign DMG with EdDSA for Sparkle ───
      - name: Sign DMG for Sparkle
        id: sign
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          DMG_PATH="$RUNNER_TEMP/$APP_NAME.dmg"

          # Download Sparkle binary tools
          mkdir -p "$RUNNER_TEMP/sparkle-tools"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz" \
            | tar xJ -C "$RUNNER_TEMP/sparkle-tools"
          SIGN_TOOL="$RUNNER_TEMP/sparkle-tools/bin/sign_update"
          chmod +x "$SIGN_TOOL"

          # Generate EdDSA signature
          SIGNATURE=$(echo "$SPARKLE_EDDSA_KEY" | "$SIGN_TOOL" "$DMG_PATH" --ed-key-file -)
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "✅ DMG signed for Sparkle"

      # ─── Create GitHub Release ───
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG_PATH="$RUNNER_TEMP/$APP_NAME.dmg"

          gh release create "${{ steps.version.outputs.tag }}" \
            "$DMG_PATH" \
            --title "$APP_NAME ${{ steps.version.outputs.version }}" \
            --generate-notes \
            --draft

          echo "✅ Draft release created: ${{ steps.version.outputs.tag }}"

      # ─── Generate and deploy appcast ───
      - name: Deploy appcast
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG_PATH="$RUNNER_TEMP/$APP_NAME.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_PATH" 2>/dev/null || stat -c%s "$DMG_PATH")
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SIGNATURE="${{ steps.sign.outputs.signature }}"
          PUB_DATE=$(date -R 2>/dev/null || date -u +"%a, %d %b %Y %H:%M:%S %z")

          cat > "$RUNNER_TEMP/appcast.xml" << APPCAST_EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>VoiceInk Updates</title>
              <item>
                <title>VoiceInk $VERSION</title>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                <pubDate>$PUB_DATE</pubDate>
                <enclosure
                  url="https://github.com/NewTurn2017/VoiceInk/releases/download/$TAG/VoiceInk.dmg"
                  $SIGNATURE
                  length="$DMG_SIZE"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

          # Deploy to gh-pages branch
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-deploy
          git rm -rf . 2>/dev/null || true
          cp "$RUNNER_TEMP/appcast.xml" appcast.xml
          git add appcast.xml
          git commit -m "Update appcast for $TAG"
          git push origin gh-pages-deploy:gh-pages --force

          echo "✅ Appcast deployed to gh-pages"

      # ─── Cleanup keychain ───
      - name: Cleanup
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
